version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pead_postgres
    restart: always
    environment:
      POSTGRES_USER: pead_admin
      POSTGRES_PASSWORD: pead_secure_password
      POSTGRES_DB: pead_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
